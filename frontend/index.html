<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070B14;--bg2:#0C1220;--bg3:#101828;--bg4:#141E30;--bg5:#192438;

  --fg:#ECF0F8;--fg2:#9BADC8;--fg3:#5E7494;--fg4:#344B68;
  --blue:#4F8EF7;--blue2:#3B7EF0;--blue3:#2563EB;

  --green:#0FBA81;--gbg:rgba(15,186,129,.1);
  --red:#F05252;--rbg:rgba(240,82,82,.1);

html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--bg);color:var(--fg);font-size:13px;display:flex;flex-direction:column}

input,textarea,select{font-family:var(--sans);font-size:13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--fg);outline:none;transition:border .15s,box-shadow .15s}

select option{background:var(--bg3)}

.bp{background:var(--blue);color:#fff}.bp:hover{background:var(--blue2)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bs{background:var(--bg4);color:var(--fg2);border:1px solid var(--border)}.bs:hover{background:var(--bg5);border-color:var(--border2)}
.bg{background:transparent;color:var(--fg3);padding:6px 10px}.bg:hover{background:var(--bg4);color:var(--fg)}
.sm{padding:5px 10px;font-size:11px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;position:relative;z-index:10}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--gborder) 30%,var(--gborder) 70%,transparent 100%)}
.logo-sap{background:var(--blue);color:#fff;font-weight:900;font-size:12px;letter-spacing:.06em;padding:4px 9px;border-radius:5px}
.hdr-title{font-weight:700;font-size:14px;letter-spacing:-.01em}
.hdr-sub{font-size:10px;color:var(--fg4);font-family:var(--mono);margin-top:1px}
.sap-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono);border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg3)}
.sap-pill .dot{width:6px;height:6px;border-radius:50%}
.sap-pill.ok{border-color:rgba(15,186,129,.3);background:var(--gbg);color:var(--green)}.sap-pill.ok .dot{background:var(--green);box-shadow:0 0 6px var(--green)}

.sb-sec{padding:14px 10px 5px;font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--fg4);text-transform:uppercase;font-family:var(--mono)}
.si{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);color:var(--fg3);font-weight:500;font-size:12px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;margin:1px 0;transition:all .1s}
.si:hover{background:var(--bg4);color:var(--fg)}
.si.a{background:rgba(79,142,247,.12);color:var(--blue);border:1px solid rgba(79,142,247,.2)}
.si .ic{font-size:13px;width:17px;text-align:center;flex-shrink:0}
.sb-foot{padding:10px 12px;border-top:1px solid var(--border);margin-top:auto;font-family:var(--mono);font-size:10px;color:var(--fg4)}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.panel{flex:1;display:flex;flex-direction:column;padding:18px;overflow:hidden}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-shrink:0}
.pt{font-size:15px;font-weight:700;letter-spacing:-.01em}
.ps{font-size:12px;color:var(--fg3);margin-top:1px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;flex-shrink:0}

.kw{color:#60A5FA}.str{color:#34D399}.cm{color:#3D506A;font-style:italic}

.bubble.user{background:var(--blue3);color:#fff;align-self:flex-end}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;flex-shrink:0}
.tbtn{background:none;border:none;border-bottom:2px solid transparent;padding:8px 13px;font-size:12px;font-weight:600;color:var(--fg3);cursor:pointer;letter-spacing:.02em;transition:all .12s}
.tbtn.a{border-bottom-color:var(--blue);color:var(--blue)}.tbtn:hover{color:var(--fg)}
