name: Deploy ABAP AI Studio

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'frontend/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check Worker syntax
        run: node -c worker/src/index.js
      - name: Build frontend into Worker
        run: |
          cd worker/src
          python3 -c "
          import base64
          with open('../../frontend/index.html') as f: html=f.read()
          b64=base64.b64encode(html.encode()).decode()
          with open('index.js') as f: code=f.read()
          start=code.find('const HTML_B64 = \"')
          end=code.find('\";',start+18)
          code=code[:start]+'const HTML_B64 = \"'+b64+'\"'+code[end:]
          with open('index.js','w') as f: f.write(code)
          print(f'Built: {len(code)} bytes')
          "
          node -c index.js
          echo "Syntax check: PASSED"

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Worker
        run: |
          cd worker/src
          python3 -c "
          import base64
          with open('../../frontend/index.html') as f: html=f.read()
          b64=base64.b64encode(html.encode()).decode()
          with open('index.js') as f: code=f.read()
          start=code.find('const HTML_B64 = \"')
          end=code.find('\";',start+18)
          code=code[:start]+'const HTML_B64 = \"'+b64+'\"'+code[end:]
          with open('index.js','w') as f: f.write(code)
          "
      - name: Deploy to Cloudflare Workers
        env:
          CF_TOKEN: UiPONPWg2l0VbTVCitbkpZ-tu8gKvhgH42tCbsrZ
          CF_ACCOUNT: bab06c93e17ae71cae3c11b4cc40240b
        run: |
          curl -s -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/abap-ai-studio/content" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F 'metadata={"main_module":"index.js"};type=application/json' \
            -F "index.js=@worker/src/index.js;type=application/javascript+module" \
            | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Deployed:', d.get('success'))
          if not d.get('success'):
            print('Errors:', d.get('errors'))
            sys.exit(1)
          "
      - name: Health check
        run: |
          sleep 5
          curl -sf https://abap.v2retail.net/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Health:', d.get('status')); sys.exit(0 if d.get('status')=='ok' else 1)"
