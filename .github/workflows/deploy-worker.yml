name: Deploy ABAP AI Studio

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'frontend/**'
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Restore from KV Backup + Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch good backup code from Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
          CF_ACCOUNT_ID: bab06c93e17ae71cae3c11b4cc40240b
          KV_NAMESPACE: 0ef65b613ca74302844f9101c085f17d
          BACKUP_KEY: backup:abap-ai-studio:1776759693005
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os, sys

          account = os.environ['CF_ACCOUNT_ID']
          ns = os.environ['KV_NAMESPACE']
          key = os.environ['BACKUP_KEY']
          token = os.environ['CF_API_TOKEN']

          # URL-encode the key (colons need encoding)
          from urllib.parse import quote
          encoded_key = quote(key, safe='')

          url = f'https://api.cloudflare.com/client/v4/accounts/{account}/storage/kv/namespaces/{ns}/values/{encoded_key}'
          print(f'Fetching: {url}')

          req = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
          try:
              with urllib.request.urlopen(req) as r:
                  raw = r.read().decode('utf-8')
              data = json.loads(raw)
              code = data['code']
              with open('/tmp/worker.js', 'w') as f:
                  f.write(code)
              print(f'SUCCESS: Fetched {len(code)} chars of worker code')
          except Exception as e:
              print(f'ERROR: {e}')
              sys.exit(1)
          PYEOF

      - name: Deploy to Cloudflare Workers (service worker format)
        env:
          CF_API_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
          CF_ACCOUNT_ID: bab06c93e17ae71cae3c11b4cc40240b
        run: |
          echo "Deploying $(wc -c < /tmp/worker.js) bytes to abap-ai-studio..."
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/abap-ai-studio" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/javascript" \
            --data-binary @/tmp/worker.js)
          echo "Result: $RESULT"
          SUCCESS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success','false'))")
          echo "Success: $SUCCESS"
          if [ "$SUCCESS" != "True" ] && [ "$SUCCESS" != "true" ]; then
            echo "Deploy failed!"
            exit 1
          fi

      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -s https://abap.v2retail.net/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','FAIL'))" 2>/dev/null || echo "FAIL")
          echo "Health: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            echo "WARNING: Health check failed but deploy may still be propagating"
          fi
