name: Deploy ABAP AI Studio

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'frontend/**'
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy Worker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build worker with embedded frontend
        run: |
          cd worker/src
          python3 << 'PYEOF'
          import base64
          with open('../../frontend/index.html') as f:
              html = f.read()
          b64 = base64.b64encode(html.encode()).decode()
          with open('index.js') as f:
              code = f.read()
          s = code.find('const HTML_B64 = "')
          e = code.find('";', s + 18)
          code = code[:s] + 'const HTML_B64 = "' + b64 + '"' + code[e:]
          with open('/tmp/worker.js', 'w') as f:
              f.write(code)
          print('Built:', len(code), 'bytes')
          PYEOF

      - name: Deploy to Cloudflare Workers (module format)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: bab06c93e17ae71cae3c11b4cc40240b
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/abap-ai-studio/content" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F 'metadata={"main_module":"index.js"};type=application/json' \
            -F "index.js=@/tmp/worker.js;type=application/javascript+module" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployed:', d.get('success')); [print('Error:', e) for e in d.get('errors',[])]; sys.exit(0 if d.get('success') else 1)"

      - name: Health check
        run: |
          sleep 5
          curl -s https://abap.v2retail.net/health
