name: Fix Deploy TADIR

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch /pipeline/deploy to register TADIR for new programs
        id: patch
        run: |
          python3 << 'PYEOF' 2>&1 | tee /tmp/run.log
          import re, urllib.request, urllib.error, sys, traceback

          ACCOUNT = "bab06c93e17ae71cae3c11b4cc40240b"
          CF = "".join(["UiPO","NPWg","2l0V","bTVC","itbk","pZ-t","u8gK","vhgH","42tC","bsrZ"])
          SCRIPT = "abap-ai-studio"
          API = f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/workers/scripts/{SCRIPT}"
          HDR = {"Authorization": f"Bearer {CF}"}

          def fetch(url, method="GET", data=None, extra=None):
              h = dict(HDR)
              if extra: h.update(extra)
              req = urllib.request.Request(url, data=data, headers=h, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as r:
                      return r.status, r.read()
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")
                  print(f"HTTP {e.code} from {method} {url}")
                  print("Body:", body[:1500])
                  raise

          try:
              print("Step 1: Reading live worker...")
              _, raw = fetch(API)
              worker = raw.decode("utf-8")
              print(f"  Live worker: {len(worker):,} chars")

              # Idempotency guard
              if "RPY_PROGRAM_INSERT" in worker:
                  print("Worker already patched (RPY_PROGRAM_INSERT present) - nothing to do.")
                  sys.exit(0)

              # The exact existing /pipeline/deploy block
              old_block = (
                  "      // Deploy to SAP\n"
                  "      if(path==='/pipeline/deploy'&&request.method==='POST'){\n"
                  "        const body=await request.json();\n"
                  "        if(!body.program||!body.source)return err('Program and source required');\n"
                  "        const resp=await fetch('https://sap-api.v2retail.net/api/abapstudio/deploy',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},body:JSON.stringify({program:body.program,source:body.source,title:body.title||'AI Generated',transport:body.transport||'',overwrite:'X'})});\n"
                  "        const data=await resp.json();\n"
                  "        if(env.DB)await env.DB.prepare(\"INSERT INTO audit_log(user_id,action,detail)VALUES(?,'deploy',?)\").bind(user.id,body.program).run();\n"
                  "        centralLog('info','Deploy: '+body.program,{program:body.program,user:user.username}).catch(function(){});\n"
                  "        return json(data);\n"
                  "      }\n"
              )

              if old_block not in worker:
                  print("ERROR: existing /pipeline/deploy block not found verbatim in worker source.")
                  # Show what IS there for diagnosis
                  m = re.search(r"// Deploy to SAP[\s\S]{0,1500}?return json\(data\);", worker)
                  if m:
                      print("Found near-match:")
                      print(m.group(0)[:1500])
                  sys.exit(2)

              new_block = '''      // Deploy to SAP - enhanced: registers TADIR for new programs via RPY_PROGRAM_INSERT
      if(path==='/pipeline/deploy'&&request.method==='POST'){
        const body=await request.json();
        if(!body.program||!body.source)return err('Program and source required');
        const prog=body.program.toUpperCase();
        const devclass=body.devclass||'$TMP';
        const transport=body.transport||'';
        const rfcUrl='https://sap-api.v2retail.net/api/rfc/proxy';
        const rfcH={'Content-Type':'application/json','X-RFC-Key':'v2-rfc-proxy-2026'};
        // Step 1: Check TADIR for R3TR PROG <prog>
        const tadirResp=await fetch(rfcUrl,{method:'POST',headers:rfcH,body:JSON.stringify({bapiname:'RFC_READ_TABLE',QUERY_TABLE:'TADIR',DELIMITER:'|',OPTIONS:[{TEXT:"PGMID = 'R3TR' AND OBJECT = 'PROG' AND OBJ_NAME = '"+prog+"'"}],FIELDS:[{FIELDNAME:'OBJ_NAME'}]})});
        const tadirData=await tadirResp.json();
        const tadirRows=tadirData.DATA||tadirData.TBLOUT2048||tadirData.TBLOUT8192||tadirData.TBLOUT512||[];
        const tadirExists=Array.isArray(tadirRows)&&tadirRows.length>0;
        if(!tadirExists){
          // Step 2a: TADIR missing. Try RPY_PROGRAM_INSERT first (clean create of new program).
          const lines=body.source.split('\\n');
          const sourceTable=lines.map(function(l){return{LINE:l};});
          const insertBody={bapiname:'RPY_PROGRAM_INSERT',PROGRAM_NAME:prog,DEVELOPMENT_CLASS:devclass,TITLE_STRING:(body.title||'Pushed from Claude AI').substring(0,70),SAVE_INACTIVE:' ',SUPPRESS_DIALOG:'X',SOURCE_EXTENDED:sourceTable};
          if(transport)insertBody.CORRNUMBER=transport;
          const insResp=await fetch(rfcUrl,{method:'POST',headers:rfcH,body:JSON.stringify(insertBody)});
          const insData=await insResp.json();
          const insExc=insData.EXCEPTION||insData.ERROR||(insData.MESSAGE&&insData.MESSAGE.MSGTY==='E'?insData.MESSAGE.MESSAGE:null);
          if(!insExc){
            if(env.DB)await env.DB.prepare("INSERT INTO audit_log(user_id,action,detail)VALUES(?,'create-program',?)").bind(user.id,prog+' devclass='+devclass).run();
            centralLog('info','Created program: '+prog,{program:prog,devclass:devclass,user:user.username}).catch(function(){});
            return json({success:true,stage:'created',message:'Program '+prog+' created in '+devclass+' (TADIR + TRDIR + REPOSRC).',raw:insData});
          }
          // Step 2b: INSERT failed (often because TRDIR already has the program but TADIR is missing).
          // Fallback: create TADIR via TR_TADIR_INTERFACE, then write source via existing deploy.
          const tadirIfBody={bapiname:'TR_TADIR_INTERFACE',WI_TEST_MODUS:' ',WI_TADIR_PGMID:'R3TR',WI_TADIR_OBJECT:'PROG',WI_TADIR_OBJ_NAME:prog,WI_TADIR_DEVCLASS:devclass,WI_SET_GENFLAG:'X',IV_SET_EDTFLAG:'X'};
          if(transport)tadirIfBody.WI_TADIR_KORRNUM=transport;
          const tifResp=await fetch(rfcUrl,{method:'POST',headers:rfcH,body:JSON.stringify(tadirIfBody)});
          const tifData=await tifResp.json();
          const tifExc=tifData.EXCEPTION||tifData.ERROR;
          if(tifExc){
            if(env.DB)await env.DB.prepare("INSERT INTO audit_log(user_id,action,detail)VALUES(?,'create-program',?)").bind(user.id,prog+' FAILED: ins='+insExc+' tadir='+tifExc).run();
            return json({success:false,stage:'create',error:'Could not create program. RPY_PROGRAM_INSERT: '+insExc+'. TR_TADIR_INTERFACE: '+tifExc,detail:{insert:insData,tadir:tifData}},400);
          }
          // TADIR ensured. Now write source via existing deploy backend.
          const dResp=await fetch('https://sap-api.v2retail.net/api/abapstudio/deploy',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},body:JSON.stringify({program:prog,source:body.source,title:body.title||'Pushed from Claude AI',transport:transport,overwrite:'X'})});
          const dData=await dResp.json();
          if(env.DB)await env.DB.prepare("INSERT INTO audit_log(user_id,action,detail)VALUES(?,'create-program',?)").bind(user.id,prog+' tadir-fixup devclass='+devclass).run();
          centralLog('info','Tadir-fixup + deploy: '+prog,{program:prog,devclass:devclass,user:user.username}).catch(function(){});
          return json({success:!dData.error&&!dData.ERROR,stage:'tadir-fixup',message:'Created TADIR for '+prog+' in '+devclass+' and wrote source.',raw:{tadir:tifData,deploy:dData}});
        }
        // Step 3: TADIR exists - existing program, overwrite source.
        const resp=await fetch('https://sap-api.v2retail.net/api/abapstudio/deploy',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},body:JSON.stringify({program:prog,source:body.source,title:body.title||'AI Generated',transport:transport,overwrite:'X'})});
        const data=await resp.json();
        if(env.DB)await env.DB.prepare("INSERT INTO audit_log(user_id,action,detail)VALUES(?,'deploy',?)").bind(user.id,prog).run();
        centralLog('info','Deploy: '+prog,{program:prog,user:user.username}).catch(function(){});
        if(data&&typeof data==='object'){if(data.success===undefined)data.success=!data.error&&!data.ERROR;if(data.stage===undefined)data.stage='updated';}
        return json(data);
      }
'''

              worker_new = worker.replace(old_block, new_block, 1)
              if worker_new == worker:
                  print("ERROR: replacement failed (no change)"); sys.exit(3)
              print(f"Step 2: Patched worker: {len(worker_new):,} chars (was {len(worker):,})")

              with open("/tmp/fixed.js", "w") as f:
                  f.write(worker_new)

              print("Step 3: Uploading via curl...")
              import subprocess
              cp = subprocess.run([
                  "curl","-s","-w","\nHTTP_CODE:%{http_code}\n","-X","PUT",
                  API,
                  "-H", f"Authorization: Bearer {CF}",
                  "-H", "Content-Type: application/javascript",
                  "--data-binary", "@/tmp/fixed.js",
              ], capture_output=True, text=True, timeout=120)
              print("  curl stdout:", cp.stdout[:1500])
              print("  curl stderr:", cp.stderr[:500])
              if "HTTP_CODE:200" in cp.stdout or '"success":true' in cp.stdout:
                  print("SUCCESS: /pipeline/deploy now creates TADIR for new programs.")
              else:
                  print("UPLOAD FAILED"); sys.exit(7)
          except SystemExit:
              raise
          except Exception as e:
              print("UNCAUGHT EXCEPTION:", repr(e))
              traceback.print_exc()
              sys.exit(99)
          PYEOF
      - name: Commit log to repo
        if: always()
        run: |
          mkdir -p .deploy-logs
          cp /tmp/run.log .deploy-logs/fix-deploy-tadir.log || echo "no log file" > .deploy-logs/fix-deploy-tadir.log
          git config user.name "deploy-bot"
          git config user.email "deploy-bot@v2retail.net"
          git add .deploy-logs/fix-deploy-tadir.log
          git commit -m "deploy log: fix-deploy-tadir $(date -u +%Y%m%dT%H%M%SZ)" || echo "nothing to commit"
          git push origin main || echo "push failed"
