name: Deploy Azure SAP Bridge
on:
  push:
    paths: ['azure/**']
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: dabrgacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push
        working-directory: azure
        run: |
          docker build -t dabrgacr.azurecr.io/abap-sap-proxy:${{ github.sha }} .
          docker push dabrgacr.azurecr.io/abap-sap-proxy:${{ github.sha }}
      - name: Deploy Container App
        run: |
          az containerapp update \
            --name abap-sap-proxy \
            --resource-group dab-rg \
            --image dabrgacr.azurecr.io/abap-sap-proxy:${{ github.sha }}
