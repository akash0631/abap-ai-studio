name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and deploy
        run: python3 worker/src/direct_deploy.py
      - name: Health check
        run: sleep 8 && curl -s https://abap.v2retail.net/health
