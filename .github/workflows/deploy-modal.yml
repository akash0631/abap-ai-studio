name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy patched worker
        env:
          CFTOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
        run: |
          python3 - << 'EOF'
          import base64, re, json, urllib.request, os, sys

          token = os.environ["CFTOKEN"]
          account = "bab06c93e17ae71cae3c11b4cc40240b"

          # Fetch backup worker code from KV (has full HTML_B64 embedded)
          from urllib.parse import quote
          kv_key = quote("backup:abap-ai-studio:1776771923379", safe="")
          url = f"https://api.cloudflare.com/client/v4/accounts/{account}/storage/kv/namespaces/0ef65b613ca74302844f9101c085f17d/values/{kv_key}"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          with urllib.request.urlopen(req) as r:
              backup = json.loads(r.read())
          worker_code = backup["code"]
          print(f"Backup worker: {len(worker_code)} chars")

          # Extract original HTML
          m = re.search(r'HTML_B64\s*=\s*"([A-Za-z0-9+/=]{100,})"', worker_code)
          html = base64.b64decode(m.group(1)).decode("utf-8")
          print(f"Original HTML: {len(html)} bytes")

          # Patch 1: Add SapModal component before App
          SAP_MODAL = """function SapModal({token,onDone,onSkip}){const[su,setSu]=useState('SAP_ABAP');const[pw,setPw]=useState('');const[er,setEr]=useState('');const[ld,setLd]=useState(false);const[ck,setCk]=useState(true);useEffect(()=>{const t=setTimeout(()=>setCk(false),2500);api('/sap/connect',{},token).then(d=>{clearTimeout(t);if(d.connected){onDone();}else setCk(false);}).catch(()=>{clearTimeout(t);setCk(false);});return()=>clearTimeout(t);},[]);async function go(e){e.preventDefault();setLd(true);setEr('');try{if(pw.trim())await api('/auth/update-sap',{sap_user:su,sap_password:pw},token);const d=await api('/sap/connect',{},token);if(d.connected)onDone();else setEr('SAP not reachable. Check network to 192.168.144.174.');}catch(x){setEr(x.message);}setLd(false);}const E=React.createElement;const ov={position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999};const bx={background:'#111827',border:'1px solid #374151',borderRadius:12,padding:28,width:420,maxWidth:'90vw',boxShadow:'0 25px 60px rgba(0,0,0,.9)'};const fi={width:'100%',background:'#1F2937',border:'1px solid #374151',borderRadius:6,padding:'10px 13px',color:'#F9FAFB',fontSize:14,fontFamily:'monospace',outline:'none',marginTop:4,boxSizing:'border-box'};const lb={fontSize:11,fontWeight:700,color:'#6B7280',textTransform:'uppercase',letterSpacing:'.07em',display:'block'};if(ck)return E('div',{style:ov},E('div',{style:{...bx,textAlign:'center',padding:40}},E('div',{style:{fontSize:30,marginBottom:12}},'\\u2699\\ufe0f'),E('div',{style:{fontWeight:700,color:'#F9FAFB',fontSize:16,marginBottom:6}},'Connecting to SAP...'),E('div',{style:{fontSize:12,color:'#6B7280'}},'DEV 192.168.144.174 \\u00b7 Client 210')));return E('div',{style:ov},E('div',{style:bx},E('div',{style:{display:'flex',gap:14,marginBottom:20,alignItems:'center'}},E('div',{style:{width:48,height:48,background:'#2563EB',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:900,fontSize:14,flexShrink:0}},'SAP'),E('div',null,E('div',{style:{fontWeight:700,fontSize:16,color:'#F9FAFB'}},'SAP System Login'),E('div',{style:{fontSize:12,color:'#6B7280',marginTop:2}},'DEV 192.168.144.174 \\u00b7 Client 210'))),E('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,background:'#1F2937',borderRadius:8,padding:12,marginBottom:18}},[['System','S4/HANA'],['Host','192.168.144.174'],['Client','210'],['Type','DEV']].map(([k,v])=>E('div',{key:k},E('div',{style:{fontSize:10,color:'#6B7280',marginBottom:2}},k),E('div',{style:{fontSize:12,color:'#F9FAFB',fontWeight:600}},v)))),E('form',{onSubmit:go,style:{display:'flex',flexDirection:'column',gap:12}},E('div',null,E('label',{style:lb},'SAP Username'),E('input',{style:fi,value:su,onChange:e=>setSu(e.target.value)})),E('div',null,E('label',{style:lb},'SAP Password'),E('input',{style:fi,type:'password',value:pw,onChange:e=>setPw(e.target.value),placeholder:'Enter SAP password',autoFocus:true})),er&&E('div',{style:{padding:'8px 12px',background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',borderRadius:6,color:'#F87171',fontSize:12}},er),E('div',{style:{display:'flex',gap:8,marginTop:4}},E('button',{type:'submit',disabled:ld,style:{flex:1,padding:11,fontWeight:700,fontSize:13,background:'#2563EB',color:'#fff',border:'none',borderRadius:6,cursor:ld?'not-allowed':'pointer',opacity:ld?.55:1}},ld?'Connecting...':'Connect to SAP'),E('button',{type:'button',onClick:onSkip,style:{padding:'11px 18px',fontWeight:600,fontSize:12,background:'transparent',color:'#9CA3AF',border:'1px solid #374151',borderRadius:6,cursor:'pointer'}},'Skip'))),E('div',{style:{marginTop:14,fontSize:11,color:'#374151',textAlign:'center'}},'Credentials saved \\u00b7 encrypted at rest')));}\n"""

          # Patch 2-4: App state + badge + login
          S1 = "const[tab,setTab]=useState('chat');const[sapOk,setSapOk]=useState(false);\n  useEffect(()=>{if(!token)return;api('/sap/connect',{},token).then(d=>{if(d.connected)setSapOk(true)}).catch(()=>{})},[token]);"
          R1 = "const[tab,setTab]=useState('chat');const[sapOk,setSapOk]=useState(false);const[showSap,setShowSap]=useState(false);\n  useEffect(()=>{if(!token)return;api('/sap/connect',{},token).then(d=>{if(d.connected){setSapOk(true);}else{setTimeout(()=>setShowSap(true),500);}}).catch(()=>{setTimeout(()=>setShowSap(true),500);});},[token]);"
          S2 = "React.createElement('span',{className:'badge b-amber'},'\\u25CB SAP Connecting...')"
          R2 = "React.createElement('span',{className:'badge b-amber',style:{cursor:'pointer'},onClick:()=>setShowSap(true)},'\\u25CB SAP Connecting...')"
          S3 = "if(!token||!user)return React.createElement(Login,{onLogin:(t,u)=>{setToken(t);setUser(u)}});"
          R3 = "if(!token||!user)return React.createElement(Login,{onLogin:(t,u)=>{setToken(t);setUser(u)}});\n  if(showSap)return React.createElement(SapModal,{token,onDone:()=>{setSapOk(true);setShowSap(false);},onSkip:()=>setShowSap(false)});"

          html = html.replace("function App(){", SAP_MODAL + "function App(){", 1)
          html = html.replace(S1, R1, 1)
          html = html.replace(S2, R2, 1)
          html = html.replace(S3, R3, 1)

          assert "function SapModal" in html, "SapModal missing!"
          assert "type:'password'" in html, "password field missing!"
          assert "setShowSap(true)" in html, "auto-show missing!"
          print(f"Patched HTML: {len(html)} bytes - ALL CHECKS PASSED")

          # Embed patched HTML back into worker
          new_b64 = base64.b64encode(html.encode()).decode()
          worker_code = worker_code[:m.start(1)] + new_b64 + worker_code[m.end(1):]

          # Fix addEventListener to pass env secrets
          OLD = 'addEventListener("fetch",function(e){\n  e.respondWith(handleRequest(e.request,{}));\n});'
          NEW = 'addEventListener("fetch",function(e){\n  e.respondWith(handleRequest(e.request,{\n    ANTHROPIC_KEY:typeof ANTHROPIC_KEY!=="undefined"?ANTHROPIC_KEY:undefined,\n    JWT_SECRET:typeof JWT_SECRET!=="undefined"?JWT_SECRET:"fallback",\n    CF_DEPLOY_TOKEN:typeof CF_DEPLOY_TOKEN!=="undefined"?CF_DEPLOY_TOKEN:undefined,\n    GH_TOKEN:typeof GH_TOKEN!=="undefined"?GH_TOKEN:undefined,\n    DB:typeof __D1_BETA__DB!=="undefined"?__D1_BETA__DB:undefined\n  }));\n});'
          worker_code = worker_code.replace(OLD, NEW)

          # Fix /sap/connect to use working endpoint
          worker_code = worker_code.replace(
              "fetch('https://sap-api.v2retail.net/api/abapstudio/health',{headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'}})",
              "fetch('https://sap-api.v2retail.net/api/abapstudio/query',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},body:JSON.stringify({sql:'SELECT TOP 1 MANDT FROM T000'})})"
          )
          worker_code = worker_code.replace(
              "return json({connected:!!(d.status==='ok'||d.ok||d.connected),system:'S4D'});",
              "return json({connected:Array.isArray(d.rows),system:'S4D'});"
          )

          print(f"Final worker: {len(worker_code)} chars")
          print(f"Env secrets fix: {'typeof ANTHROPIC_KEY' in worker_code}")

          with open("/tmp/worker.js", "w") as f:
              f.write(worker_code)
          print("Worker saved to /tmp/worker.js")
          EOF

      - name: Deploy to Cloudflare
        env:
          CFTOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
        run: |
          echo "Worker size: $(wc -c < /tmp/worker.js) bytes"
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/bab06c93e17ae71cae3c11b4cc40240b/workers/scripts/abap-ai-studio" \
            -H "Authorization: Bearer $CFTOKEN" \
            -H "Content-Type: application/javascript" \
            --data-binary @/tmp/worker.js)
          echo "Result: $RESULT"
          OK=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('success') else 'false')" 2>/dev/null)
          echo "Success: $OK"
          if [ "$OK" = "true" ]; then
            echo "DEPLOYED SUCCESSFULLY!"
          else
            echo "Deploy failed - CF_DEPLOY_TOKEN may lack Workers:Edit permission"
            # Try module format as fallback
            echo "Trying module format..."
            python3 -c "
          code = open('/tmp/worker.js').read()
          import re
          code = re.sub(r'addEventListener.*$', 'export default {\n  async fetch(request, env) {\n    return handleRequest(request, env);\n  }\n};', code, flags=re.DOTALL)
          open('/tmp/worker_module.js','w').write(code)
          print('Module worker:', len(code), 'chars')
            "
            RESULT2=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/bab06c93e17ae71cae3c11b4cc40240b/workers/scripts/abap-ai-studio/content" \
              -H "Authorization: Bearer $CFTOKEN" \
              -F 'metadata={"main_module":"index.js"};type=application/json' \
              -F "index.js=@/tmp/worker_module.js;type=application/javascript+module")
            echo "Module result: $RESULT2"
            OK2=$(echo "$RESULT2" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d.get('success') else 'false')" 2>/dev/null)
            if [ "$OK2" = "true" ]; then echo "MODULE FORMAT DEPLOYED!"; else echo "Both formats failed - token lacks Workers:Edit"; exit 1; fi
          fi

      - name: Health check
        run: |
          sleep 8
          curl -s https://abap.v2retail.net/health
