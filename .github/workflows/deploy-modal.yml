name: Deploy SAP Modal Fix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-modal.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build worker with SAP Modal patch
        run: |
          cd worker/src
          python3 build.py
          ls -la /tmp/w.js || ls -la worker_built.js

      - name: Deploy to Cloudflare (service-worker format)
        run: |
          WORKER_FILE="/tmp/w.js"
          if [ ! -f "$WORKER_FILE" ]; then
            WORKER_FILE="worker/src/worker_built.js"
          fi
          echo "Deploying $WORKER_FILE ($(wc -c < $WORKER_FILE) bytes)..."

          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/bab06c93e17ae71cae3c11b4cc40240b/workers/scripts/abap-ai-studio" \
            -H "Authorization: Bearer UiPONPWg2l0VbTVCitbkpZ-tu8gKvhgH42tCbsrZ" \
            -H "Content-Type: application/javascript" \
            --data-binary @$WORKER_FILE | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Success:', d.get('success'))
          for e in d.get('errors',[]): print('Error:', e)
          sys.exit(0 if d.get('success') else 1)
          "

      - name: Health check
        run: |
          sleep 6
          curl -s https://abap.v2retail.net/health
          echo ""
          echo "Done!"
