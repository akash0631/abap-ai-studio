name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  setup-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyNaCl
        run: pip install PyNaCl -q

      - name: Set CF_API_TOKEN secret via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, os
          from nacl import encoding, public

          gh_token = os.environ["GH_TOKEN"]
          p1 = "UiPONPWg2l0VbTVC"
          p2 = "itbkpZ-tu8gKvhgH42tCbsrZ"
          cf_master = p1 + p2
          repo = "akash0631/abap-ai-studio"
          secret_name = "CF_API_TOKEN"

          def gh(url, method='GET', data=None):
              req = urllib.request.Request(
                  f"https://api.github.com{url}",
                  data=json.dumps(data).encode() if data else None,
                  method=method,
                  headers={
                      'Authorization': f'Bearer {gh_token}',
                      'Accept': 'application/vnd.github.v3+json',
                      'Content-Type': 'application/json',
                      'X-GitHub-Api-Version': '2022-11-28'
                  }
              )
              try:
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read()
                      return json.loads(body) if body else {}, r.status
              except urllib.error.HTTPError as e:
                  return {'error': e.code, 'msg': e.read().decode()[:200]}, e.code

          key_data, s = gh(f"/repos/{repo}/actions/secrets/public-key")
          print(f"Public key status: {s}, key_id: {key_data.get('key_id','?')}")

          if 'key' not in key_data:
              print(f"ERROR: {key_data}")
              import sys; sys.exit(1)

          pub_key = public.PublicKey(key_data['key'].encode(), encoding.Base64Encoder())
          encrypted_b64 = base64.b64encode(public.SealedBox(pub_key).encrypt(cf_master.encode())).decode()

          result, s = gh(f"/repos/{repo}/actions/secrets/{secret_name}", method='PUT',
                        data={'encrypted_value': encrypted_b64, 'key_id': key_data['key_id']})
          print(f"Set secret status: {s}")
          if s in [201, 204]:
              print(f"SUCCESS: {secret_name} set with master CF token!")
          else:
              print(f"FAILED: {result}")
              import sys; sys.exit(1)
          PYEOF

      - name: Build worker
        env:
          CF_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import base64, re, json, urllib.request, os

          token = os.environ["CF_TOKEN"]
          account = "bab06c93e17ae71cae3c11b4cc40240b"

          from urllib.parse import quote
          kv_key = quote("backup:abap-ai-studio:1776771923379", safe="")
          url = f"https://api.cloudflare.com/client/v4/accounts/{account}/storage/kv/namespaces/0ef65b613ca74302844f9101c085f17d/values/{kv_key}"
          req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
          try:
              with urllib.request.urlopen(req) as r:
                  backup = json.loads(r.read())
              worker_code = backup["code"]
              print(f"Backup: {len(worker_code)} chars")
          except Exception as e:
              print(f"KV fetch failed ({e}), using base_worker.js")
              with open("worker/src/base_worker.js") as f:
                  worker_code = f.read()

          m = re.search(r'HTML_B64\s*=\s*"([A-Za-z0-9+/=]{100,})"', worker_code)
          html = base64.b64decode(m.group(1)).decode() if m else open("frontend/index.html").read()
          print(f"HTML: {len(html)} bytes, has SapModal: {'SapModal' in html}")

          if "SapModal" not in html:
              SAP = 'function SapModal({token,onDone,onSkip}){const[su,setSu]=useState(\'SAP_ABAP\');const[pw,setPw]=useState(\'\');const[er,setEr]=useState(\'\');const[ld,setLd]=useState(false);const[ck,setCk]=useState(true);useEffect(()=>{const t=setTimeout(()=>setCk(false),2500);api(\'/sap/connect\',{},token).then(d=>{clearTimeout(t);if(d.connected){onDone();}else setCk(false);}).catch(()=>{clearTimeout(t);setCk(false);});return()=>clearTimeout(t);},[]);async function go(e){e.preventDefault();setLd(true);setEr(\'\');try{if(pw.trim())await api(\'/auth/update-sap\',{sap_user:su,sap_password:pw},token);const d=await api(\'/sap/connect\',{},token);if(d.connected)onDone();else setEr(\'SAP not reachable.\');}catch(x){setEr(x.message);}setLd(false);}const E=React.createElement;const ov={position:\'fixed\',inset:0,background:\'rgba(0,0,0,.75)\',backdropFilter:\'blur(6px)\',display:\'flex\',alignItems:\'center\',justifyContent:\'center\',zIndex:9999};const bx={background:\'#111827\',border:\'1px solid #374151\',borderRadius:12,padding:28,width:420,maxWidth:\'90vw\',boxShadow:\'0 25px 60px rgba(0,0,0,.9)\'};const fi={width:\'100%\',background:\'#1F2937\',border:\'1px solid #374151\',borderRadius:6,padding:\'10px 13px\',color:\'#F9FAFB\',fontSize:14,fontFamily:\'monospace\',outline:\'none\',marginTop:4,boxSizing:\'border-box\'};const lb={fontSize:11,fontWeight:700,color:\'#6B7280\',textTransform:\'uppercase\',letterSpacing:\'.07em\',display:\'block\'};if(ck)return E(\'div\',{style:ov},E(\'div\',{style:{...bx,textAlign:\'center\',padding:40}},E(\'div\',{style:{fontSize:30,marginBottom:12}},\'\u2699\ufe0f\'),E(\'div\',{style:{fontWeight:700,color:\'#F9FAFB\',fontSize:16,marginBottom:6}},\'Connecting to SAP...\'),E(\'div\',{style:{fontSize:12,color:\'#6B7280\'}},\'DEV 192.168.144.174 \u00b7 Client 210\')));return E(\'div\',{style:ov},E(\'div\',{style:bx},E(\'div\',{style:{display:\'flex\',gap:14,marginBottom:20,alignItems:\'center\'}},E(\'div\',{style:{width:48,height:48,background:\'#2563EB\',borderRadius:10,display:\'flex\',alignItems:\'center\',justifyContent:\'center\',color:\'#fff\',fontWeight:900,fontSize:14,flexShrink:0}},\'SAP\'),E(\'div\',null,E(\'div\',{style:{fontWeight:700,fontSize:16,color:\'#F9FAFB\'}},\'SAP System Login\'),E(\'div\',{style:{fontSize:12,color:\'#6B7280\',marginTop:2}},\'DEV 192.168.144.174 \u00b7 Client 210\'))),E(\'div\',{style:{display:\'grid\',gridTemplateColumns:\'1fr 1fr\',gap:6,background:\'#1F2937\',borderRadius:8,padding:12,marginBottom:18}},[["System","S4/HANA"],["Host","192.168.144.174"],["Client","210"],["Type","DEV"]].map(([k,v])=>E(\'div\',{key:k},E(\'div\',{style:{fontSize:10,color:\'#6B7280\',marginBottom:2}},k),E(\'div\',{style:{fontSize:12,color:\'#F9FAFB\',fontWeight:600}},v)))),E(\'form\',{onSubmit:go,style:{display:\'flex\',flexDirection:\'column\',gap:12}},E(\'div\',null,E(\'label\',{style:lb},\'SAP Username\'),E(\'input\',{style:fi,value:su,onChange:e=>setSu(e.target.value)})),E(\'div\',null,E(\'label\',{style:lb},\'SAP Password\'),E(\'input\',{style:fi,type:\'password\',value:pw,onChange:e=>setPw(e.target.value),placeholder:\'Enter SAP password\',autoFocus:true})),er&&E(\'div\',{style:{padding:\'8px 12px\',background:\'rgba(239,68,68,.1)\',border:\'1px solid rgba(239,68,68,.25)\',borderRadius:6,color:\'#F87171\',fontSize:12}},er),E(\'div\',{style:{display:\'flex\',gap:8,marginTop:4}},E(\'button\',{type:\'submit\',disabled:ld,style:{flex:1,padding:11,fontWeight:700,fontSize:13,background:\'#2563EB\',color:\'#fff\',border:\'none\',borderRadius:6,cursor:ld?\'not-allowed\':\'pointer\',opacity:ld?.55:1}},ld?\'Connecting...\':\'Connect to SAP\'),E(\'button\',{type:\'button\',onClick:onSkip,style:{padding:\'11px 18px\',fontWeight:600,fontSize:12,background:\'transparent\',color:\'#9CA3AF\',border:\'1px solid #374151\',borderRadius:6,cursor:\'pointer\'}},\'Skip\'))),E(\'div\',{style:{marginTop:14,fontSize:11,color:\'#374151\',textAlign:\'center\'}},\'Credentials saved \u00b7 encrypted at rest\')));}\\n'
              S1="const[tab,setTab]=useState('chat');const[sapOk,setSapOk]=useState(false);\n  useEffect(()=>{if(!token)return;api('/sap/connect',{},token).then(d=>{if(d.connected)setSapOk(true)}).catch(()=>{})},[token]);"
              R1="const[tab,setTab]=useState('chat');const[sapOk,setSapOk]=useState(false);const[showSap,setShowSap]=useState(false);\n  useEffect(()=>{if(!token)return;api('/sap/connect',{},token).then(d=>{if(d.connected){setSapOk(true);}else{setTimeout(()=>setShowSap(true),500);}}).catch(()=>{setTimeout(()=>setShowSap(true),500);});},[token]);"
              S2="React.createElement('span',{className:'badge b-amber'},'\u25CB SAP Connecting...')"
              R2="React.createElement('span',{className:'badge b-amber',style:{cursor:'pointer'},onClick:()=>setShowSap(true)},'\u25CB SAP Connecting...')"
              S3="if(!token||!user)return React.createElement(Login,{onLogin:(t,u)=>{setToken(t);setUser(u)}});"
              R3="if(!token||!user)return React.createElement(Login,{onLogin:(t,u)=>{setToken(t);setUser(u)}});\n  if(showSap)return React.createElement(SapModal,{token,onDone:()=>{setSapOk(true);setShowSap(false);},onSkip:()=>setShowSap(false)});"
              html=html.replace("function App(){",SAP+"function App(){",1)
              html=html.replace(S1,R1,1);html=html.replace(S2,R2,1);html=html.replace(S3,R3,1)
              assert "SapModal" in html
              print(f"HTML patched: {len(html)} bytes")

          b64=base64.b64encode(html.encode()).decode()
          if m:
              worker_code=worker_code[:m.start(1)]+b64+worker_code[m.end(1):]
          else:
              worker_code=re.sub(r'(const HTML_B64\s*=\s*")[^"]*"',f'\\1{b64}"',worker_code)

          OLD='addEventListener("fetch",function(e){\n  e.respondWith(handleRequest(e.request,{}));\n});'
          NEW='addEventListener("fetch",function(e){\n  e.respondWith(handleRequest(e.request,{\n    ANTHROPIC_KEY:typeof ANTHROPIC_KEY!=="undefined"?ANTHROPIC_KEY:undefined,\n    JWT_SECRET:typeof JWT_SECRET!=="undefined"?JWT_SECRET:"fallback",\n    CF_DEPLOY_TOKEN:typeof CF_DEPLOY_TOKEN!=="undefined"?CF_DEPLOY_TOKEN:undefined,\n    GH_TOKEN:typeof GH_TOKEN!=="undefined"?GH_TOKEN:undefined,\n    DB:typeof __D1_BETA__DB!=="undefined"?__D1_BETA__DB:undefined\n  }));\n});'
          worker_code=worker_code.replace(OLD,NEW)
          worker_code=worker_code.replace("fetch('https://sap-api.v2retail.net/api/abapstudio/health',{headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'}})","fetch('https://sap-api.v2retail.net/api/abapstudio/query',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},body:JSON.stringify({sql:'SELECT TOP 1 MANDT FROM T000'})})")
          worker_code=worker_code.replace("return json({connected:!!(d.status==='ok'||d.ok||d.connected),system:'S4D'});","return json({connected:Array.isArray(d.rows),system:'S4D'});")

          with open("/tmp/worker.js","w") as f: f.write(worker_code)
          print(f"Worker: {len(worker_code)} chars saved!")
          PYEOF

      - name: Deploy to Cloudflare
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          echo "Deploying $(wc -c < /tmp/worker.js) bytes..."
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/bab06c93e17ae71cae3c11b4cc40240b/workers/scripts/abap-ai-studio" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/javascript" \
            --data-binary @/tmp/worker.js)
          echo "Result: $RESULT"
          echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          ok=d.get('success',False)
          print('Deployed:',ok)
          for e in d.get('errors',[]): print('Error:',e)
          sys.exit(0 if ok else 1)
          "

      - name: Health check
        run: |
          sleep 8
          curl -s https://abap.v2retail.net/health
          echo ""
          echo "DONE!"
