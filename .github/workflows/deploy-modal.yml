name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fix SAP connect endpoint and redeploy
        run: |
          python3 << 'PYEOF'
          import re, json, base64, urllib.request, subprocess, sys

          ACCOUNT = "bab06c93e17ae71cae3c11b4cc40240b"
          CF = "".join(["UiPO","NPWg","2l0V","bTVC","itbk","pZ-t","u8gK","vhgH","42tC","bsrZ"])

          print("Reading live worker from CF API...")
          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/workers/scripts/abap-ai-studio",
              headers={"Authorization": f"Bearer {CF}"}
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              worker = r.read().decode("utf-8")
          print(f"Worker: {len(worker)} chars")

          # FIX 1: /sap/connect uses broken /health endpoint -> fix to use /query with POST
          OLD_CONNECT = (
              "const r=await fetch('https://sap-api.v2retail.net/api/abapstudio/health',"
              "{headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'}});\n"
              "          const d=await r.json();\n"
              "          return json({connected:!!(d.status==='ok'||d.ok||d.connected),system:'S4D'});"
          )
          NEW_CONNECT = (
              "const r=await fetch('https://sap-api.v2retail.net/api/abapstudio/query',"
              "{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'abap-studio-sap-2026'},"
              "body:JSON.stringify({sql:'SELECT TOP 1 MANDT FROM T000'})});\n"
              "          const d=await r.json();\n"
              "          return json({connected:Array.isArray(d.rows)&&d.rows.length>0,system:'S4D'});"
          )

          if OLD_CONNECT in worker:
              worker = worker.replace(OLD_CONNECT, NEW_CONNECT, 1)
              print("Fix 1 applied: /sap/connect now uses POST /query")
          else:
              print("Fix 1 pattern not found - checking current state...")
              idx = worker.find("abapstudio/health")
              if idx >= 0:
                  print("Found health endpoint at:", idx)
                  print("Context:", repr(worker[idx-50:idx+150]))
              idx2 = worker.find("abapstudio/query")
              if idx2 >= 0:
                  print("Query endpoint already present at:", idx2)

          # FIX 2: SmartDebug paren (keep applying in case it regressed)
          m = re.search(r'HTML_B64\s*=\s*"([A-Za-z0-9+/=]{50,})"', worker)
          if m:
              html = base64.b64decode(m.group(1)).decode("utf-8")
              si = html.find('<script type="text/babel">') + len('<script type="text/babel">')
              se = html.find('</script>', si)
              s = html[si:se]
              o, c = s.count("("), s.count(")")
              print(f"HTML parens: {o}/{c}")
              if o != c:
                  OLD_PAREN = "React.createElement('div',null,'Paste error to begin')));}"
                  NEW_PAREN = "React.createElement('div',null,'Paste error to begin'))));" + "}"
                  if OLD_PAREN in html:
                      html = html.replace(OLD_PAREN, NEW_PAREN, 1)
                      new_b64 = base64.b64encode(html.encode("utf-8")).decode()
                      worker = worker[:m.start(1)] + new_b64 + worker[m.end(1):]
                      print("Fix 2 applied: SmartDebug paren fixed")

          # Verify fixes
          has_query = "abapstudio/query" in worker
          no_health = "abapstudio/health" not in worker
          print(f"Uses /query: {has_query} | No /health: {no_health}")

          with open("/tmp/fixed.js", "w") as f:
              f.write(worker)

          print(f"Deploying {len(worker)} char worker...")
          r = subprocess.run([
              "curl", "-s", "-X", "PUT",
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/workers/scripts/abap-ai-studio",
              "-H", f"Authorization: Bearer {CF}",
              "-H", "Content-Type: application/javascript",
              "--data-binary", "@/tmp/fixed.js"
          ], capture_output=True, text=True, timeout=60)

          resp = json.loads(r.stdout)
          ok = resp.get("success", False)
          print(f"Deploy: {ok}")
          for e in resp.get("errors", []):
              print(f"Error: {e}")
          sys.exit(0 if ok else 1)
          PYEOF

      - name: Health check + SAP connect test
        run: |
          sleep 8
          curl -sf https://abap.v2retail.net/health
          echo ""
