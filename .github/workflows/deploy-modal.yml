name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch live worker, fix SmartDebug paren, redeploy
        run: |
          python3 << 'PYEOF'
          import re, json, base64, urllib.request, subprocess, sys

          ACCOUNT = "bab06c93e17ae71cae3c11b4cc40240b"
          CF = "".join(["UiPO","NPWg","2l0V","bTVC","itbk","pZ-t","u8gK","vhgH","42tC","bsrZ"])

          print("Reading live worker from CF API...")
          req = urllib.request.Request(
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/workers/scripts/abap-ai-studio",
              headers={"Authorization": f"Bearer {CF}"}
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              worker = r.read().decode("utf-8")
          print(f"Worker: {len(worker)} chars")

          m = re.search(r'HTML_B64\s*=\s*"([A-Za-z0-9+/=]{50,})"', worker)
          assert m, "HTML_B64 not found in worker!"
          html = base64.b64decode(m.group(1)).decode("utf-8")
          print(f"HTML: {len(html)} bytes")

          si = html.find('<script type="text/babel">') + len('<script type="text/babel">')
          se = html.find('</script>', si)
          s = html[si:se]
          o, c = s.count("("), s.count(")")
          print(f"Parens: {o}/{c} balanced={o==c}")

          if o != c:
              OLD = "React.createElement('div',null,'Paste error to begin')));}"
              NEW = "React.createElement('div',null,'Paste error to begin'))));" + "}"
              assert OLD in html, f"Fix pattern not found! chars around bug: {html[html.find('Paste error'):html.find('Paste error')+30]}"
              html = html.replace(OLD, NEW, 1)
              s2 = html[html.find('<script type="text/babel">')+len('<script type="text/babel">'):html.find('</script>',html.find('<script type="text/babel">'))]
              o2, c2 = s2.count("("), s2.count(")")
              print(f"After fix: {o2}/{c2} balanced={o2==c2}")
              assert o2 == c2, "Still unbalanced!"
              new_b64 = base64.b64encode(html.encode("utf-8")).decode()
              worker = worker[:m.start(1)] + new_b64 + worker[m.end(1):]
              print(f"Fixed worker: {len(worker)} chars")
          else:
              print("Parens already balanced - deploying as-is")

          with open("/tmp/fixed.js", "w") as f:
              f.write(worker)

          r = subprocess.run([
              "curl", "-s", "-X", "PUT",
              f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT}/workers/scripts/abap-ai-studio",
              "-H", f"Authorization: Bearer {CF}",
              "-H", "Content-Type: application/javascript",
              "--data-binary", "@/tmp/fixed.js"
          ], capture_output=True, text=True, timeout=60)

          resp = json.loads(r.stdout)
          ok = resp.get("success", False)
          print(f"Deploy: {ok}")
          for e in resp.get("errors", []):
              print(f"Error: {e}")
          sys.exit(0 if ok else 1)
          PYEOF

      - name: Health check
        run: sleep 8 && curl -sf https://abap.v2retail.net/health
