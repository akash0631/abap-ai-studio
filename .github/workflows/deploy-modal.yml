name: Deploy SAP Modal Fix

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy worker with SAP modal patch
        env:
          CF_R2_TOKEN: ${{ secrets.CF_DEPLOY_TOKEN }}
        run: python3 worker/src/deploy.py

      - name: Health check
        run: |
          sleep 8
          curl -s https://abap.v2retail.net/health
          echo ""
